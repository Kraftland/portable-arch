[metadata]
# Optional
# The command to build a package. Should be "extra-x86_64-build" or "archlinuxcn-x86_64-build"
#buildPrefix	= "extra-x86_64-build"

# The package type. Can be repo or build. Defines whether this package is pre-built or not. Defaults to "build"
type = "build"

# Your GitHub user name
maintainer	= "Kimiblock"

[[depends]]
# Optional
#buildPrefix	= "extra-x86_64-build"

# The package name of a dependency
pkgname		= "netease-cloud-music"

# Source can be either a string of git URL (type git), or repo name (type repo) to download from locally defined repositories.
sourceType	= "git"
source		= "https://aur.archlinux.org/netease-cloud-music.git"
[[depends.depends]]
# Optional
#buildPrefix	= "extra-x86_64-build"

# The package name of a dependency
pkgname		= "gtk2"

# Source can be either a string of git URL (type git), or repo name (type repo) to download from locally defined repositories.
sourceType	= "repo"
source		= "archlinuxcn"